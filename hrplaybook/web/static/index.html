<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>HR Playbook ⚾</title>
<style>
  :root{
    --bg:#0e1116; --panel:#161b22; --panel2:#1c232d; --line:#2a323d;
    --text:#e6edf3; --muted:#8b949e; --accent:#f0a000; --green:#2ea043;
    --red:#da3633; --blue:#388bfd; --t1:#2ea043; --t2:#d29922; --t3:#6e7681;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
       font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  header{position:sticky;top:0;z-index:10;background:var(--panel);border-bottom:1px solid var(--line);
         padding:10px 16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  header h1{font-size:16px;margin:0;letter-spacing:.5px}
  header h1 .dim{color:var(--muted);font-weight:400}
  select,input,button{background:var(--panel2);color:var(--text);border:1px solid var(--line);
         border-radius:6px;padding:6px 10px;font-size:13px}
  button{cursor:pointer}
  button:hover{border-color:var(--accent)}
  button.primary{background:var(--accent);color:#1a1a1a;border-color:var(--accent);font-weight:600}
  button:disabled{opacity:.5;cursor:not-allowed}
  .spacer{flex:1}
  #status{font-size:12px;color:var(--muted);min-width:180px;text-align:right}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .dot.run{background:var(--accent);animation:pulse 1s infinite}
  .dot.ok{background:var(--green)} .dot.err{background:var(--red)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  nav{display:flex;gap:2px;padding:0 16px;background:var(--panel);border-bottom:1px solid var(--line)}
  nav button{border:none;border-bottom:2px solid transparent;border-radius:0;background:none;
       color:var(--muted);padding:10px 14px}
  nav button.active{color:var(--text);border-bottom-color:var(--accent)}
  main{padding:16px;max-width:1400px;margin:0 auto}
  .banner{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 16px;min-width:90px}
  .stat .n{font-size:22px;font-weight:700}
  .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .note{background:var(--panel2);border-left:3px solid var(--accent);padding:8px 12px;border-radius:4px;
        margin-bottom:14px;color:var(--muted)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:7px 9px;border-bottom:1px solid var(--line);white-space:nowrap}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;cursor:pointer;user-select:none;
     position:sticky;top:0;background:var(--panel)}
  tbody tr:hover{background:var(--panel2)}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:auto;margin-bottom:16px}
  .badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:600}
  .b-elite{background:#143; color:#7ee787} .b-good{background:#341;color:#e3b341}
  .b-neutral{background:#222b36;color:#8b949e} .b-deadair{background:#3a1d1d;color:#f85149}
  .tag{display:inline-block;background:#222b36;color:#9da7b3;border:1px solid var(--line);
       border-radius:4px;padding:0 5px;font-size:10px;margin-right:3px}
  .tag.hot{color:#f0a000;border-color:#5a4400}.tag.miss{color:#7ee787;border-color:#1d4d2b}
  .tag.plat{color:#79c0ff;border-color:#1f4a7a}.tag.late{color:#d2a8ff;border-color:#43326b}
  .v-pos{color:var(--green);font-weight:600}.v-neg{color:var(--red)}.v-fair{color:var(--muted)}
  .card{border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:8px;background:var(--panel)}
  .card .hd{display:flex;justify-content:space-between;align-items:baseline}
  .card .nm{font-weight:700;font-size:15px}.card .sp{color:var(--muted);font-size:12px}
  .card .ln{margin-top:4px;color:#adbac7;font-size:12px}
  .card .bets b{color:var(--accent)}
  .tierhd{font-size:13px;font-weight:700;margin:18px 0 8px;letter-spacing:.5px}
  .tierhd.t1{color:var(--t1)}.tierhd.t2{color:var(--t2)}.tierhd.t3{color:var(--t3)}
  .filters{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .empty{color:var(--muted);padding:40px;text-align:center}
  .mono{font-variant-numeric:tabular-nums}
  .ev-pos{color:#7ee787}.ev-neg{color:#f85149}
  h3{margin:18px 0 8px;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  #slateBar{padding:5px 16px;background:#10151c;border-bottom:1px solid var(--line);font-size:12px;color:var(--muted)}
  #slateBar b{color:var(--text)}
  #slateBar .warn{color:#f0a064}
  /* propfinder-style cheatsheet */
  .chips{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
  .chip{background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:5px 14px;
        font-size:12px;font-weight:600;cursor:pointer;color:var(--muted)}
  .chip.active{background:var(--accent);color:#1a1a1a;border-color:var(--accent)}
  table.cs td,table.cs th{padding:6px 10px}
  .cs .pl{display:flex;align-items:center;gap:9px;min-width:190px}
  .cs .pl img{width:34px;height:34px;border-radius:50%;background:var(--panel2);object-fit:cover;
       border:1px solid var(--line)}
  .cs .pl .nm{font-weight:700;font-size:13px;line-height:1.1}
  .cs .pl .tm{font-size:11px;color:var(--muted)}
  .cs .mu{font-size:12px;color:#adbac7}.cs .mu .h{color:var(--muted)}
  .prop{display:inline-block;background:#222b36;border:1px solid var(--line);border-radius:5px;
        padding:2px 8px;font-size:12px;font-weight:600;white-space:nowrap}
  .prop.HR{color:#f0a000;border-color:#5a4400}.prop.TB{color:#79c0ff;border-color:#1f4a7a}
  .prop.HRR{color:#d2a8ff;border-color:#43326b}.prop.Hits{color:#7ee787;border-color:#1d4d2b}
  .heat{text-align:center;font-weight:700;font-variant-numeric:tabular-nums;border-radius:4px;color:#0c0f14}
  .heat.dim{color:var(--muted);background:transparent!important;font-weight:400}
  .rk{color:var(--muted);font-variant-numeric:tabular-nums;text-align:right;width:26px}
  /* freshness chips */
  .fresh{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .fchip{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);
         border-radius:7px;padding:5px 10px;font-size:12px}
  .fchip .fdot{width:8px;height:8px;border-radius:50%}
  .fdot.green{background:#2ea043}.fdot.yellow{background:#d29922}.fdot.red{background:#da3633}.fdot.gray{background:#6e7681}
  .fchip .fl{color:var(--muted)}.fchip .fv{font-weight:600}
  /* tooltips */
  #tip{position:fixed;z-index:999;max-width:300px;background:#0b0e13;border:1px solid var(--accent);
       border-radius:7px;padding:9px 11px;font-size:12px;color:var(--text);pointer-events:none;
       box-shadow:0 6px 20px rgba(0,0,0,.5);display:none;line-height:1.4}
  #tip .tt{font-weight:700;color:var(--accent);margin-bottom:3px}
  #tip .tw{color:#adbac7}#tip .tg{color:#7ee787;font-size:11px}#tip .tb{color:#f0a064;font-size:11px}
  [data-tip]{cursor:help;border-bottom:1px dotted var(--muted)}
  th[data-tip]{border-bottom:1px dotted var(--line)}
  /* validate + glossary */
  .vpanel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:6px 14px;margin-bottom:14px}
  .vrow{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px}
  .vrow:last-child{border-bottom:none}
  .vbadge{font-weight:700;font-size:11px;padding:2px 8px;border-radius:5px;min-width:64px;text-align:center}
  .vPASS{background:#143;color:#7ee787}.vWARNING{background:#3a2d10;color:#e3b341}.vFAIL{background:#3a1d1d;color:#f85149}
  .gloss h3{margin:20px 0 6px}
  .gloss table{width:100%}.gloss td{vertical-align:top}
  .gloss .ab{font-weight:700;color:var(--accent);white-space:nowrap}
  .gloss .gd{color:#7ee787;font-size:12px}.gloss .bd{color:#f0a064;font-size:12px}
  /* Today's Best 5 + My Model (Phase 12/13/18) */
  .read{background:linear-gradient(180deg,#171f29,#141a22);border:1px solid var(--line);
        border-left:3px solid var(--accent);border-radius:10px;padding:14px 18px;margin-bottom:16px}
  .read .rg{font-size:13px;color:#cdd9e5;line-height:1.6}
  .read b{color:var(--text)}
  .best-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:20px}
  .bcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;position:relative;overflow:hidden}
  .bcard .lbl{font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .bcard .who{display:flex;align-items:center;gap:10px}
  .bcard .who img{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:var(--panel2)}
  .bcard .nm{font-weight:700;font-size:16px}.bcard .sub{font-size:12px;color:var(--muted)}
  .bcard .big{position:absolute;top:10px;right:14px;text-align:right}
  .bcard .big .sc{font-size:30px;font-weight:800;line-height:1}
  .bcard .big .gr{font-size:12px;font-weight:700}
  .stars{color:var(--accent);font-size:13px;letter-spacing:1px}
  .why{margin-top:10px;font-size:12px}
  .why li{margin:2px 0;color:#adbac7;list-style:none}
  .why li::before{content:"✓ ";color:#7ee787}
  .flags li{margin:2px 0;color:#e0a0a0;list-style:none;font-size:11px}
  .flags li::before{content:"⚠ ";color:#f0a064}
  .gpill{display:inline-block;padding:1px 7px;border-radius:5px;font-weight:700;font-size:11px}
  .g-Ap{background:#0f5132;color:#7ee787}.g-A{background:#14532d;color:#86efac}
  .g-B{background:#3a2d10;color:#e3b341}.g-C{background:#42260f;color:#f0a064}.g-D{background:#3a1d1d;color:#f08a8a}
  .mscore{display:inline-flex;flex-direction:column;align-items:center;min-width:46px;padding:3px 0;
          border-radius:6px;border:1px solid var(--line)}
  .mscore .mv{font-weight:800;font-size:15px}.mscore .mk{font-size:9px;color:var(--muted);text-transform:uppercase}
  .bdbars div{display:flex;align-items:center;gap:8px;margin:3px 0;font-size:12px}
  .bdbars .bn{width:120px;color:var(--muted)}.bdbars .bb{height:8px;background:var(--accent);border-radius:3px}
  .bdbars .bp{width:30px;text-align:right;font-variant-numeric:tabular-nums}
  /* multi-season cleanup (Batch 9): trend badges + compact cards */
  .tb-imp{background:#0f5132;color:#7ee787}.tb-dec{background:#42260f;color:#f0a064}
  .tb-same{background:#222b36;color:#8b949e}.tb-small{background:#3a2d10;color:#e3b341}
  .tb-mix{background:#2b2350;color:#b69cff}
  .mscards{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
  .mscard{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 12px;min-width:160px}
  .mscard .t{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:5px}
  .mscard .v{font-size:12px;color:#adbac7;line-height:1.7}
  .mscard .miss{color:var(--muted);font-style:italic}
</style>
</head>
<body>
<header>
  <h1>HR Playbook <span class="dim">⚾ dashboard</span></h1>
  <select id="dateSel" title="slate date"></select>
  <input id="dateInput" type="date" title="run a new date"/>
  <button id="btnRun" class="primary">Run</button>
  <button id="btnRefresh">Refresh</button>
  <button id="btnGrade">Grade</button>
  <button id="btnValidate" title="Check pitchers, lineups, weather, statcast, odds, game status">Validate</button>
  <button id="btnForce" title="Bypass cache and re-pull everything">Force Refresh</button>
  <button id="btnYesterday" title="Review yesterday's (or the most recent graded) slate — one date only">📊 Yesterday Review</button>
  <label style="font-size:12px;color:var(--muted)"><input type="checkbox" id="noStat"/> no-statcast</label>
  <div class="spacer"></div>
  <div id="status">—</div>
</header>
<nav id="tabs">
  <button data-tab="home" class="active">Today's Best</button>
  <button data-tab="model">My Model</button>
  <button data-tab="sheet">Cheat Sheet</button>
  <button data-tab="cards">Bet Cards</button>
  <button data-tab="value">Value</button>
  <button data-tab="weather">Weather</button>
  <button data-tab="pitchers">Pitchers</button>
  <button data-tab="missed">Missed HR</button>
  <button data-tab="contact">Contact</button>
  <button data-tab="bvp">BvP</button>
  <button data-tab="slate">Slate</button>
  <button data-tab="matchups">Matchups</button>
  <button data-tab="performance">Performance</button>
  <button data-tab="ledger">Ledger</button>
  <button data-tab="glossary">Glossary</button>
</nav>
<div id="slateBar"></div>
<main id="view"><div class="empty">Loading…</div></main>
<div id="tip"></div>

<script>
const $ = s => document.querySelector(s);
let STATE = {date:null, slate:null, tab:"home", sort:{key:"play_score",dir:-1}, filter:""};

const fmtPct = v => v==null||v===""?"—":(v*100).toFixed(0)+"%";
const num = v => v==null||v===""?"—":(+v).toFixed(typeof v==="number"&&v<10?1:0);
const envBadge = t => `<span class="badge b-${(t||'').replace('-','')}">${t||'?'}</span>`;
function tagHtml(tags){
  if(!tags) return "";
  return String(tags).split("|").filter(Boolean).map(t=>{
    let c = t.includes("HOT")?"hot": t.includes("MISSED")?"miss":
            t.includes("PLATOON")?"plat": t.includes("LATE")?"late":"";
    return `<span class="tag ${c}">${t}</span>`;
  }).join("");
}
function valueCls(v){return v==="+EV"?"v-pos":v==="-EV"?"v-neg":"v-fair";}

async function api(path, opts){const r=await fetch(path,opts); if(!r.ok) throw new Error(await r.text()); return r.json();}

async function loadDates(){
  const d = await api("/api/dates");
  STATE.today = d.today;
  const sel = $("#dateSel"); sel.innerHTML="";
  const dates = (d.dates && d.dates.length) ? d.dates.slice() : [d.today];
  if(!STATE.date) STATE.date = dates[0] || d.today;       // first load default
  if(!dates.includes(STATE.date)) dates.unshift(STATE.date);
  dates.forEach(x=>{
    const o=document.createElement("option"); o.value=x; o.textContent=x; sel.appendChild(o);
  });
  syncDateControls();
}

// --- single source of truth for the selected date ---
function syncDateControls(){
  const sel=$("#dateSel");
  if(![...sel.options].some(o=>o.value===STATE.date)){
    const o=document.createElement("option"); o.value=STATE.date; o.textContent=STATE.date; sel.appendChild(o);
  }
  if(sel.value!==STATE.date) sel.value=STATE.date;
  if($("#dateInput").value!==STATE.date) $("#dateInput").value=STATE.date;
  updateSlateBar();
}
function updateSlateBar(){
  const el=$("#slateBar"); if(!el) return;
  let html=`Viewing slate: <b>${STATE.date||"—"}</b>`;
  if(STATE.today && STATE.date && STATE.date!==STATE.today)
    html+=` <span class="sp">(today is ${STATE.today})</span>`;
  if(STATE.slate && STATE.slate.exists===false)
    html+=` <span class="warn">⚠ no slate built for this date</span>`;
  else if(STATE.slate && STATE.slate.date && STATE.slate.date!==STATE.date)
    html+=` <span class="warn">⚠ showing data from ${STATE.slate.date}</span>`;
  if(STATE.lastGraded) html+=` · Last graded: <b>${STATE.lastGraded}</b>`;
  el.innerHTML=html;
}
function setDate(d){ if(!d) return; STATE.date=d; STATE.slate=null; syncDateControls(); loadSlate(); }

async function loadSlate(){
  if(!STATE.date) return;
  try{ STATE.slate = await api("/api/slate/"+STATE.date); }
  catch(e){ STATE.slate={exists:false,games:[],matchups:[]}; }
  STATE.slate.date = STATE.slate.date || STATE.date;
  syncDateControls();
  render();
}

function render(){
  const v=$("#view"), s=STATE.slate;
  if(STATE.tab==="ledger"){ return renderLedger(); }
  if(STATE.tab==="glossary"){ return renderGlossary(); }
  if(STATE.tab==="home"){ return renderHome(); }
  if(STATE.tab==="model"){ return renderModel(); }
  if(STATE.tab==="value"){ return renderValue(); }
  if(STATE.tab==="performance"){ return renderPerformance(); }
  if(STATE.tab==="weather"){ return renderWeather(); }
  if(STATE.tab==="pitchers"){ return renderPitchers(); }
  if(STATE.tab==="missed"){ return renderMissed(); }
  if(STATE.tab==="contact"){ return renderContact(); }
  if(STATE.tab==="bvp"){ return renderBvP(); }
  if(!s || !s.exists){
    v.innerHTML=`<div class="empty">No data for <b>${STATE.date}</b>.<br/>Click <b>Run</b> to build this slate.</div>`;
    return;
  }
  if(STATE.tab==="slate") renderSlate();
  else if(STATE.tab==="sheet") renderSheet();
  else if(STATE.tab==="cards") renderCards();
  else if(STATE.tab==="matchups") renderMatchups();
}

function renderSlate(){
  const s=STATE.slate, sm=s.summary;
  const banner=`<div class="banner">
    <div class="stat"><div class="n">${sm.games}</div><div class="l">games</div></div>
    <div class="stat"><div class="n">${sm.elite}</div><div class="l">elite env</div></div>
    <div class="stat"><div class="n">${sm.good}</div><div class="l">good env</div></div>
    <div class="stat"><div class="n">${sm.dead_air.length}</div><div class="l">dead-air</div></div>
    <div class="stat"><div class="n">${sm.tier1}</div><div class="l">tier-1 HR</div></div>
    <div class="stat"><div class="n">${sm.matchups}</div><div class="l">matchups</div></div>
  </div>`;
  const dead = sm.dead_air.length? `<div class="note">Dead-air (HRs suppressed, TB live): <b>${sm.dead_air.join(", ")}</b></div>`:"";
  const fresh = freshnessHtml(STATE.slate.meta);
  const rows = s.games.map(g=>`<tr>
    <td><b>${g.matchup}</b></td><td>${g.venue||""}</td>
    <td>${envBadge(g.env_tier)} <span class="mono">${g.env_score}</span></td>
    <td class="mono">${g.temp_f??"—"}°</td>
    <td>${g.wind_mph??"—"} mph ${g.wind_out||""}</td>
    <td>${g.away_sp||"TBD"} <span class="sp">→ ${g.home_sp||"TBD"}</span></td>
  </tr>`).join("");
  $("#view").innerHTML = fresh+banner+dead+`<div class="panel"><table>
    <thead><tr><th>Game</th><th>Venue</th><th>Env</th><th>Temp</th><th>Wind</th><th>Pitchers (away→home)</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

function playerLine(m){
  return `<div class="card">
    <div class="hd"><span class="nm">${m.batter} <span class="sp">(${m.team} #${m.order??"?"})</span></span>
      <span class="sp">vs ${m.opp_sp||m.opp_team} · ${envBadge(m.env_tier)} · play ${num(m.play_score)}</span></div>
    <div class="ln">B% vs PM <b>${m.barrel_vs_pm??"—"}</b> · vs-hand ${m.barrel_vs_hand??"—"} · platoon ${m.platoon||"?"}
      · HR ${fmtPct(m.model_hr_prob)} / TB ${fmtPct(m.model_tb_prob)}
      · EV logs ${(m.ev_logs||"").split("|").join(", ")||"—"} · L30 ${m.l30_avg??"—"}</div>
    <div class="ln">${tagHtml(m.tags)}</div>
    <div class="ln bets">🎯 ${(m.bets||"").split("|").filter(Boolean).map(b=>`<b>${b.replace(':',' ')}</b>`).join(" · ")||"—"}</div>
  </div>`;
}

// --- propfinder-style cheatsheet ---
const MARKETS=["All","HR","TB","HRR","Hits"];
function headshot(id){
  return `https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current/w_72,q_auto:best/v1/people/${id}/headshot/67/current`;
}
function heat(v,lo,hi){
  if(v==null||v===""||isNaN(v))return null;
  const t=Math.max(0,Math.min(1,(v-lo)/(hi-lo)));
  return `hsl(${Math.round(t*125)},62%,${38+ (1-Math.abs(t-.5))*6|0}%)`;
}
function heatCell(v,lo,hi,fmt){
  if(v==null||v===""||isNaN(v))return `<td class="heat dim">—</td>`;
  const bg=heat(+v,lo,hi); return `<td class="heat" style="background:${bg}">${fmt(+v)}</td>`;
}
const PROJ_BOUNDS={HR:[.05,.30],TB:[.35,.72]};
function projOf(m,bet){return bet==="HR"?m.model_hr_prob:bet==="TB"?m.model_tb_prob:null;}

function renderSheet(){
  const mk=STATE.sheetMarket||"All";
  let rows=[];
  for(const m of STATE.slate.matchups){
    for(const bstr of (m.bets||"").split("|").filter(Boolean)){
      const [bet,line]=bstr.split(":");
      if(mk!=="All" && bet!==mk) continue;
      rows.push({m,bet,line,proj:projOf(m,bet)});
    }
  }
  const {key,dir}=STATE.sheetSort||(STATE.sheetSort={key:"proj",dir:-1});

  rows.sort((a,b)=>{const x=val(a),y=val(b); if(x==null)return 1; if(y==null)return -1;

      <td><span class="prop ${r.bet}">${r.line}</span></td>
      ${heatCell(r.proj,pb[0],pb[1],v=>(v*100).toFixed(0)+"%")}
      ${heatCell(m.barrel_vs_pm,5,20,v=>v.toFixed(1))}
      ${heatCell(m.barrel_vs_hand,5,20,v=>v.toFixed(1))}
      ${heatCell(m.l30_avg,.2,.35,v=>v.toFixed(3).replace(/^0/,''))}

      <td style="text-align:center">${plt}</td>
      <td>${envBadge(m.env_tier)}</td>
      <td class="mono" style="text-align:center">${m.tier??""}</td>

    <div class="sp" style="color:var(--muted);margin-bottom:8px">${rows.length} props${mk!=="All"?" · "+mk:""}</div>
    <div class="panel"><table class="cs"><thead>${head}</thead><tbody>${body||'<tr><td colspan="12" class="empty">no props</td></tr>'}</tbody></table></div>`;
  document.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{STATE.sheetMarket=c.dataset.mk; renderSheet();});
  document.querySelectorAll("th[data-sk]").forEach(th=>th.onclick=()=>{
    const k=th.dataset.sk; STATE.sheetSort=STATE.sheetSort.key===k?{key:k,dir:-STATE.sheetSort.dir}:{key:k,dir:-1};
    renderSheet();});
}

function renderCards(){
  const bets=["HR","TB","HRR","Hits"];
  const ms=STATE.slate.matchups;
  let html="";
  for(const bet of bets){
    const rows=ms.filter(m=>(m.bets||"").split("|").some(b=>b.startsWith(bet+":")))
      .sort((a,b)=>(b.play_score||0)-(a.play_score||0));
    html+=`<h3>${bet} (${rows.length})</h3>`;
    if(!rows.length){ html+=`<div class="sp" style="color:var(--muted)">no plays</div>`; continue; }
    html+=`<div class="panel"><table><thead><tr>
      <th>Player</th><th>Tm</th><th>Plt</th><th>vs SP</th><th>Env</th><th>B%PM</th><th>Model</th>
      <th>Line</th><th>Value</th><th>Tags</th></tr></thead><tbody>`;
    html+=rows.map(m=>{
      const line=(m.bets||"").split("|").find(b=>b.startsWith(bet+":"))?.split(":")[1]||"";
      const model = bet==="HR"?fmtPct(m.model_hr_prob): bet==="TB"?fmtPct(m.model_tb_prob):"—";
      const plt={fav:"✓",unfav:"✗"}[m.platoon]||"·";
      return `<tr><td><b>${m.batter}</b></td><td>${m.team}</td><td>${plt}</td>
        <td>${m.opp_sp||m.opp_team}</td><td>${envBadge(m.env_tier)}</td>
        <td class="mono">${m.barrel_vs_pm??"—"}</td><td class="mono">${model}</td>
        <td>${line}</td><td class="${valueCls(m.value)}">${m.value}</td><td>${tagHtml(m.tags)}</td></tr>`;
    }).join("");
    html+=`</tbody></table></div>`;
  }
  $("#view").innerHTML=html;
}

const COLS=[
  ["batter","Player"],["team","Tm"],["opp_team","Opp"],["opp_sp","SP"],["platoon","Plt"],
  ["env_tier","Env"],["pitcher_score","SP△"],["barrel_vs_pm","B%PM"],["barrel_vs_hand","B%H"],
  ["model_hr_prob","HR%"],["model_tb_prob","TB%"],["play_score","Play"],["tier","T"],
  ["bets","Bets"],["value","Val"],["tags","Tags"]
];
function renderMatchups(){
  let ms=[...STATE.slate.matchups];
  const f=STATE.filter.toLowerCase();
  if(f) ms=ms.filter(m=>JSON.stringify(m).toLowerCase().includes(f));
  const {key,dir}=STATE.sort;
  ms.sort((a,b)=>{const x=a[key],y=b[key];
    if(x==null)return 1; if(y==null)return -1;
    return (x>y?1:x<y?-1:0)*dir;});
  const head=COLS.map(([k,l])=>`<th data-k="${k}">${l}${STATE.sort.key===k?(dir<0?" ▼":" ▲"):""}</th>`).join("");
  const body=ms.map(m=>"<tr>"+COLS.map(([k])=>{
    let v=m[k];
    if(k==="env_tier")return `<td>${envBadge(v)}</td>`;
    if(k==="value")return `<td class="${valueCls(v)}">${v||"—"}</td>`;
    if(k==="tags")return `<td>${tagHtml(v)}</td>`;
    if(k==="model_hr_prob"||k==="model_tb_prob")return `<td class="mono">${fmtPct(v)}</td>`;
    if(k==="bets")return `<td>${(v||"").split("|").join(" ")||"—"}</td>`;
    if(["pitcher_score","barrel_vs_pm","barrel_vs_hand","play_score","tier"].includes(k))
      return `<td class="mono">${v??"—"}</td>`;
    return `<td>${v??"—"}</td>`;
  }).join("")+"</tr>").join("");
  $("#view").innerHTML=`<div class="filters">
      <input id="mFilter" placeholder="filter… (name, team, tag)" value="${STATE.filter}" style="width:260px"/>
      <span class="sp" style="color:var(--muted);align-self:center">${ms.length} rows</span></div>
    <div class="panel"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
  $("#mFilter").oninput=e=>{STATE.filter=e.target.value; const p=e.target.selectionStart; renderMatchups();
     const el=$("#mFilter"); el.focus(); el.setSelectionRange(p,p);};
  document.querySelectorAll("th[data-k]").forEach(th=>th.onclick=()=>{
    const k=th.dataset.k; STATE.sort = STATE.sort.key===k?{key:k,dir:-STATE.sort.dir}:{key:k,dir:-1};
    renderMatchups();});
}

async function renderLedger(){
  let l; try{ l=await api("/api/ledger"); }catch(e){ l={summary:{},rows:[],count:0}; }
  const bets=["HR","TB","HRR","Hits"];
  let cards=`<div class="banner">`;
  for(const bet of bets){

    const roi=s.roi==null?"—":(s.roi*100>=0?"+":"")+(s.roi*100).toFixed(0)+"%";

    cards+=`<div class="stat"><div class="l">${bet}</div><div class="n">${hit}</div>
      <div class="l">${s.w}-${s.l} · ROI ${roi}</div></div>`;
  }
  cards+=`</div>`;
  if(!l.count){ $("#view").innerHTML=`<div class="empty">No graded results yet.<br/>Run a past date then click <b>Grade</b>.</div>`; return; }

// --- Today's Best + My Model (Phase 12/13/18) ---
function gradeCls(g){return {"A+":"g-Ap","A":"g-A","B":"g-B","C":"g-C","D":"g-D"}[g]||"g-C";}
function starsHtml(n){return '<span class="stars">'+"★".repeat(n)+"☆".repeat(5-n)+'</span>';}
function mdBold(s){return (s||"").replace(/\*\*(.+?)\*\*/g,"<b>$1</b>");}
function whyList(rs){return rs&&rs.length?`<ul class="why">${rs.map(r=>`<li>${r}</li>`).join("")}</ul>`:"";}
function flagList(fs){return fs&&fs.length?`<ul class="flags">${fs.map(f=>`<li>${f}</li>`).join("")}</ul>`:"";}
function bdBars(bd){const mx=Math.max(8,...bd.map(b=>b.pts));
  return `<div class="bdbars">${bd.map(b=>`<div><span class="bn">${b.label}</span>
    <span class="bb" style="width:${Math.round(b.pts/mx*120)}px"></span><span class="bp">+${b.pts}</span></div>`).join("")}</div>`;}

function featCard(label, it){
  if(!it) return `<div class="bcard"><div class="lbl">${label}</div><div class="sub" style="margin-top:14px">No qualifying play</div></div>`;
  const isP = it.batter===undefined;
  const name = isP? it.name : it.batter;
  const img = isP? "" : `<img src="${headshot(it.batter_id)}" onerror="this.style.visibility='hidden'"/>`;
  const sub = isP? (it.game||"") : `${it.team} vs ${it.opp_sp||it.opp_team}`+(it.line?` · <b>${it.line}</b>`:"");
  return `<div class="bcard">
    <div class="lbl">${label}</div>
    <div class="big"><div class="sc ${gradeCls(it.grade)}" style="background:none;padding:0">${it.score}</div>
      <div class="gr"><span class="gpill ${gradeCls(it.grade)}">${it.grade}</span></div></div>
    <div class="who">${img}<div><div class="nm">${name}</div><div class="sub">${sub}</div>
      <div>${starsHtml(it.stars)}</div></div></div>
    ${whyList(it.reasons)}${flagList(it.red_flags)}</div>`;
}

function trendBadge(label){
  if(!label) return "";
  const m={IMPROVING_POWER_PROFILE:["tb-imp","IMPROVING"],IMPROVING_CONTACT_PROFILE:["tb-imp","IMPROVING"],
    DECLINING_POWER_PROFILE:["tb-dec","DECLINING"],DECLINING_CONTACT_PROFILE:["tb-dec","DECLINING"],
    SAME_PROFILE:["tb-same","SAME"],SMALL_SAMPLE:["tb-small","SMALL SAMPLE"],
    PITCH_MIX_CHANGE:["tb-mix","PITCH MIX CHANGE"],PITCHER_REGRESSION_RISK:["tb-dec","REGRESSION RISK"]
   }[label]||["tb-same",label];
  return `<span class="gpill ${m[0]}">${m[1]}</span>`;
}
function msBlock(ms){
  if(!ms) return "";
  const tr=ms.trend||{}, w=ms.weighted||{}, s=ms.s2025, l=ms.l30||{}, c=ms.cur||{};
  const n=(v,d=1)=>v==null||v===""||isNaN(v)?'<span class="miss">—</span>':(+v).toFixed(d);
  const card=(title,d)=>{
    if(d.miss) return `<div class="mscard"><div class="t">${title}</div><div class="v miss">— no data</div></div>`;
    const parts=[];
    if("barrel" in d) parts.push(`Barrel ${n(d.barrel)}%`);
    if("ev" in d) parts.push(`EV ${n(d.ev)}`);
    if("hh" in d) parts.push(`HardHit ${n(d.hh)}%`);
    if("maxev" in d) parts.push(`MaxEV ${n(d.maxev)}`);
    if("nn" in d && d.nn!=null) parts.push(`<span class="sp">n=${d.nn}</span>`);
    return `<div class="mscard"><div class="t">${title}</div><div class="v">${parts.join(" · ")}</div></div>`;
  };
  const trendCard=`<div class="mscard"><div class="t">Trend</div>
    <div class="v"><span class="gpill ${gradeCls(tr.grade)}">${tr.grade||'?'}</span> ${trendBadge(tr.label)}
    ${(tr.reasons||[]).length?`<div class="sp" style="margin-top:4px;color:#adbac7">${tr.reasons.slice(0,3).map(r=>'• '+r).join("<br/>")}</div>`:''}</div></div>`;
  const warn=(ms.warnings||[]).length?` <span class="gpill tb-small">${ms.warnings.join(" ")}</span>`:"";
  return `<div style="margin-top:10px;border-top:1px solid var(--line);padding-top:8px">
    <div class="lbl" style="font-size:11px;color:var(--muted);text-transform:uppercase">Multi-Season${warn}</div>
    <div class="mscards">
      ${card("2025 Baseline", s?{barrel:s.barrel_pct,ev:s.avg_ev,hh:s.hardhit_pct,nn:s.pa}:{miss:true})}
      ${card("2026 Season", {barrel:c.barrel_pct,ev:c.avg_ev,hh:c.hardhit_pct})}
      ${card("Last 30 Days", l&&l.n?{barrel:l.barrel_pct,ev:l.ev,hh:l.hardhit_pct,maxev:l.max_ev,nn:l.n}:{miss:true})}
      ${card("Weighted", {barrel:w.barrel,ev:w.ev,hh:w.hardhit})}
      ${trendCard}
    </div></div>`;
}
function fmt3(v){return v==null||v===""||isNaN(v)?"—":(+v).toFixed(3).replace(/^0/,"");}
function bvpBadge(label){
  const m={ELITE_HISTORY:["tb-imp","ELITE"],GOOD_HISTORY:["tb-imp","GOOD"],NEUTRAL:["tb-same","NEUTRAL"],
    BAD_HISTORY:["tb-dec","BAD"],TOO_SMALL_SAMPLE:["tb-small","TOO SMALL"]}[label]||["tb-same",label||"—"];
  return `<span class="gpill ${m[0]}">${m[1]}</span>`;
}
function bvpCard(b){
  if(!b||!b.pa) return `<div style="margin-top:8px"><span class="lbl" style="font-size:11px;color:var(--muted);text-transform:uppercase">BvP</span> <span class="sp">unavailable</span></div>`;
  const small=b.sample_size==='TOO_SMALL';
  return `<div style="margin-top:8px;border-top:1px solid var(--line);padding-top:8px">
    <div class="lbl" style="font-size:11px;color:var(--muted);text-transform:uppercase;margin-bottom:4px">
      BvP <span class="sp">(supporting only)</span> ${bvpBadge(b.edge_label)}
      <span class="gpill ${gradeCls(b.grade)}">${b.grade}</span>
      <span class="tag">${b.sample_size} · ${b.confidence} conf</span></div>
    <div class="sub">${b.pa} PA · AVG ${fmt3(b.avg)} · SLG ${fmt3(b.slg)} · HR ${b.hr??0} · K ${b.k??0} · maxEV ${b.max_ev??'—'} · brl ${b.barrels??0}</div>
    ${small?`<div class="sub miss">BvP sample too small. Displayed for context only.</div>`
      :`<div class="sub" style="color:#adbac7">${(b.reasons||[]).map(r=>'• '+r).join('<br/>')}</div>`}</div>`;
}

function roiTxt(v){return v==null?"—":`<span class="${v>=0?'ev-pos':'ev-neg'}">${v>=0?'+':''}${(v*100).toFixed(0)}%</span>`;}
function recCells(r){return `<td class="mono">${r.w}-${r.l}</td><td class="mono">${r.hit_rate==null?'—':(r.hit_rate*100).toFixed(0)+'%'}</td>

    +["HR","TB","HRR","Hits"].map(b=>`<div class="stat"><div class="n">${bt[b]?roiTxt(bt[b].roi):'—'}</div><div class="l">${b} ROI ${bt[b]?'('+bt[b].w+'-'+bt[b].l+')':''}</div></div>`).join("")
    +`</div>`;

    cal.map(c=>`<tr><td>${c.bucket}</td><td class="mono">${c.n}</td>
      <td class="mono">${c.avg_prob==null?'—':(c.avg_prob*100).toFixed(0)+'%'}</td>
      <td class="mono">${c.actual==null?'—':(c.actual*100).toFixed(0)+'%'}</td>
      <td class="mono ${c.diff==null?'':c.diff<0?'ev-neg':'ev-pos'}">${c.diff==null?'—':(c.diff*100>=0?'+':'')+(c.diff*100).toFixed(0)+'%'}</td>
      <td class="sp">${c.diff==null||c.n<10?'':c.diff<-0.04?'overconfident':c.diff>0.04?'underconfident':'calibrated'}</td></tr>`).join("")+`</tbody></table></div>`;
  // value alerts
  const va=(p.value_alerts||{}).overall||{};
  const vaTbl=`<h3>Value Alert Performance (edge ≥ 5%)</h3>`+(va.n?`<div class="panel"><table><thead><tr><th></th><th>Rec</th><th>Hit</th><th>ROI</th><th>P/L</th><th></th></tr></thead><tbody><tr><td><b>All alerts</b></td>${recCells(va)}</tr>`+
    Object.entries((p.value_alerts||{}).by_value_grade||{}).map(([g,r])=>`<tr><td>${g}</td>${recCells(r)}</tr>`).join("")+`</tbody></table></div>`
    :`<div class="sp" style="color:var(--muted)">no priced alerts in range (needs odds)</div>`);
  // pitchmix buckets
  const pm=p.by_pitchmix||{};
  const pmTbl=`<h3>Pitch-Mix Bucket Performance (B%PM)</h3>`+(Object.values(pm).some(v=>v._all&&v._all.n)?`<div class="panel"><table><thead><tr><th>Bucket</th><th>Rec</th><th>Hit</th><th>ROI</th><th>P/L</th><th></th></tr></thead><tbody>`+
    Object.entries(pm).filter(([k,v])=>v._all&&v._all.n).map(([k,v])=>`<tr><td><b>${k}</b></td>${recCells(v._all)}</tr>`).join("")+`</tbody></table></div>`
    :`<div class="sp" style="color:var(--muted)">no rich snapshots in range yet</div>`);
  const insights=`<h3>Auto Insights</h3><div class="read"><div class="rg">`+
    (p.insights||[]).map(i=>`• ${mdBold(i)}`).join("<br/>")+`</div></div>`;
  // before vs after calibration
  const cs=p.calibration_status||[];
  const csTbl=cs.length?`<h3>Before vs After Calibration <span class="sp" style="color:var(--muted)">(error = |avg prob − actual|)</span></h3>
    <div class="panel"><table><thead><tr><th>Bet</th><th>Raw avg</th><th>Calibrated avg</th><th>Actual</th>
    <th>Raw err</th><th>Cal err</th><th>Improvement</th></tr></thead><tbody>`+
    cs.map(c=>`<tr><td><b>${c.bet}</b> <span class="sp">n=${c.n}</span></td>
      <td class="mono">${(c.raw_avg*100).toFixed(0)}%</td><td class="mono">${(c.calibrated_avg*100).toFixed(0)}%</td>
      <td class="mono">${(c.actual*100).toFixed(0)}%</td><td class="mono">${(c.raw_error*100).toFixed(1)}</td>
      <td class="mono">${(c.calibrated_error*100).toFixed(1)}</td>
      <td class="mono ${c.improvement>=0?'ev-pos':'ev-neg'}">${c.improvement>=0?'+':''}${(c.improvement*100).toFixed(1)}</td></tr>`).join("")
    +`</tbody></table></div>`:"";

  const cvg=p.calibration_coverage||{};
  const cvgCls={CALIBRATED:"g-A",PARTIAL:"g-B",RAW_FALLBACK:"g-C",NO_DATA:"g-D"};
  const cvgTbl=`<h3>Calibration Coverage</h3><div class="panel"><table><thead><tr>
    <th>Market</th><th>Status</th><th>Sample</th><th>Buckets</th><th>Note</th></tr></thead><tbody>`+
    ["HR","TB","HRR","Hits"].map(mk=>{const c=cvg[mk]||{};
     return `<tr><td><b>${mk}</b></td><td><span class="gpill ${cvgCls[c.status]||'g-C'}">${c.status||'?'}</span></td>
       <td class="mono">${c.n||0}</td><td class="mono">${c.buckets_calibrated||0}/${c.buckets_total||0}</td>
       <td class="sp" style="color:#adbac7">${c.message||''}</td></tr>`;}).join("")+`</tbody></table></div>`;
  $("#view").innerHTML=`<div class="chips">${chips}</div>`+dayBanner+lowWarn+cards+richNote+cvgTbl
    +tbl("Bet Type Performance",bt,"Bet")

    +tbl("Grade Performance",p.by_grade,"Grade")
    +sigTbl+pmTbl
    +tbl("Contact Cluster Performance",Object.fromEntries(Object.entries(p.by_cluster||{}).map(([k,v])=>[k,v._all])),"Cluster")
    +tbl("Environment Grade Performance",p.by_env_grade,"Env")

}

// --- Market vs Model / Value (Phase 14, Batch 4) ---
function oddsFmt(o){return o==null?"—":(o>0?"+":"")+o;}
function pctFmt(p){return p==null?"—":(p*100).toFixed(0)+"%";}
function edgeFmt(e){if(e==null)return "—";const s=(e*100);return `<span class="${s>=0?'ev-pos':'ev-neg'}">${s>=0?'+':''}${s.toFixed(1)}%</span>`;}
function valCls(g){return {"A+":"g-Ap","A":"g-A","B":"g-B","C":"g-C","D":"g-D","Unknown":"g-C"}[g]||"g-C";}
function staleDot(s){const c={ok:"#2ea043",yellow:"#d29922",red:"#da3633",unknown:"#6e7681"}[s]||"#6e7681";
  return `<span title="odds ${s}" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${c};margin-right:4px"></span>`;}

async function renderValue(){

  // best value cards

      <div class="sub">cal ${pctFmt(r.model_prob)} <span class="sp">(raw ${pctFmt(r.raw_model_prob)})</span> vs implied ${pctFmt(r.implied_prob)}</div></div>`;}).join("");
  const ov=v.best_overall?`<div class="bcard"><div class="lbl">Best Overall Value</div>
      <div class="big"><span class="gpill ${valCls(v.best_overall.value)}">${v.best_overall.value}</span></div>
      <div class="nm" style="margin-top:6px">${v.best_overall.player}</div>
      <div class="sub">${v.best_overall.bet_type} · ${oddsFmt(v.best_overall.odds)} · edge ${edgeFmt(v.best_overall.edge)}</div></div>`
    :`<div class="bcard"><div class="lbl">Best Overall Value</div><div class="sub" style="margin-top:14px">no odds entered</div></div>`;
  // alerts
  const alerts=v.alerts&&v.alerts.length?`<h3>⚡ Value Alerts (edge ≥ 5%)</h3><div class="panel"><table><thead><tr>
    <th>Player</th><th>Bet</th><th>Book</th><th>Odds</th><th>Model</th><th>Implied</th><th>Edge</th><th>Grade</th></tr></thead><tbody>`+
    v.alerts.map(r=>`<tr><td><b>${r.player}</b></td><td>${r.bet_type}</td><td>${r.sportsbook||''}</td>
      <td class="mono">${oddsFmt(r.odds)}</td><td class="mono">${pctFmt(r.model_prob)}</td>
      <td class="mono">${pctFmt(r.implied_prob)}</td><td class="mono">${edgeFmt(r.edge)}</td>
      <td><span class="gpill ${valCls(r.value)}">${r.value}</span></td></tr>`).join("")+`</tbody></table></div>`
    :`<h3>⚡ Value Alerts</h3><div class="sp" style="color:var(--muted)">none (enter odds to surface +EV plays)</div>`;
  // manual entry form
  const bts=(mo.bet_types||["HR","TB","HRR","Hits","RBI"]).map(b=>`<option>${b}</option>`).join("");
  const sbs=(mo.sportsbooks||["DraftKings","FanDuel","Other"]).map(b=>`<option>${b}</option>`).join("");

      <select id="mo_book">${sbs}</select>
      <input id="mo_odds" placeholder="odds e.g. +180" style="width:90px"/>
      <input id="mo_line" placeholder="line" style="width:70px"/>
      <button class="primary" id="mo_add">Add</button></div>`;
  const entries=(mo.entries||[]);
  const moList=entries.length?`<div class="panel"><table><thead><tr><th>Player</th><th>Tm</th><th>Bet</th><th>Book</th>
    <th>Odds</th><th>Line</th><th>When</th><th></th></tr></thead><tbody>`+
    entries.map(e=>`<tr><td>${e.player}</td><td>${e.team||''}</td><td>${e.bet_type}</td><td>${e.sportsbook}</td>
      <td class="mono">${oddsFmt(e.odds)}</td><td>${e.line||''}</td>
      <td class="sp">${(e.timestamp||'').replace('T',' ').slice(5,16)}</td>
      <td><button data-del="${e.id}">✕</button></td></tr>`).join("")+`</tbody></table></div>`
    :`<div class="sp" style="color:var(--muted);margin-bottom:10px">no manual odds yet</div>`;
  // leaderboards
  const lbRaw=`<h3>Best Raw Plays <span class="sp" style="color:var(--muted)">(most likely to hit)</span></h3>
    <div class="panel"><table><thead><tr><th>#</th><th>Player</th><th>Bet</th><th>Model score</th><th>Model %</th><th>Odds</th><th>Value</th></tr></thead><tbody>`+
    (v.leaderboard_raw||[]).map((r,i)=>`<tr><td class="rk">${i+1}</td><td><b>${r.player}</b> <span class="sp">${r.team}</span></td>
      <td>${r.bet_type}</td><td class="mono">${r.model_score??'—'}</td><td class="mono">${pctFmt(r.model_prob)}</td>
      <td class="mono">${oddsFmt(r.odds)}</td><td><span class="gpill ${valCls(r.value)}">${r.value}</span></td></tr>`).join("")+`</tbody></table></div>`;
  const lbVal=`<h3>Best Value Plays <span class="sp" style="color:var(--muted)">(most mispriced)</span></h3>`+
    ((v.leaderboard_value||[]).length?`<div class="panel"><table><thead><tr><th>#</th><th>Player</th><th>Bet</th><th>Odds</th><th>Src</th><th>Cal % (raw)</th><th>Implied %</th><th>Edge</th><th>Value</th></tr></thead><tbody>`+
    v.leaderboard_value.map((r,i)=>`<tr><td class="rk">${i+1}</td><td><b>${r.player}</b> <span class="sp">${r.team}</span></td>
      <td>${r.bet_type}</td><td class="mono">${oddsFmt(r.odds)} <span class="sp">${r.sportsbook||''}</span></td>
      <td><span class="tag ${r.source==='api'?'plat':''}">${r.source||'—'}</span>${({ok:'',yellow:' ⚠',red:' ⛔'})[r.stale]||''}</td>
      <td class="mono">${pctFmt(r.model_prob)} <span class="sp">(${pctFmt(r.raw_model_prob)})</span></td><td class="mono">${pctFmt(r.implied_prob)}</td>
      <td class="mono">${edgeFmt(r.edge)}</td><td><span class="gpill ${valCls(r.value)}">${r.value}</span></td></tr>`).join("")+`</tbody></table></div>`
    :`<div class="sp" style="color:var(--muted)">no priced plays — enter odds above</div>`);

  const cov=v.coverage||{};
  const covCls={CALIBRATED:"g-A",PARTIAL:"g-B",RAW_FALLBACK:"g-C",NO_DATA:"g-D"};
  const covPanel=`<div class="read" style="border-left-color:#388bfd"><div class="rg">
    <b>Calibration coverage:</b> `+["HR","TB","HRR","Hits"].map(mk=>{const c=cov[mk]||{};
      return `<span class="gpill ${covCls[c.status]||'g-C'}" title="${(c.message||'').replace(/"/g,'')}">${mk}: ${c.status||'?'}${c.n?` n=${c.n}`:''}</span>`;}).join(" ")
    +`<br/><span class="sp">${(cov.HRR&&cov.HRR.message)||''} ${(cov.Hits&&cov.Hits.message)||''}</span></div></div>`;

    +alerts+form+moList+lbVal+lbRaw;
  // wire form
  $("#mo_add").onclick=async()=>{

      sportsbook:$("#mo_book").value,odds:$("#mo_odds").value,line:$("#mo_line").value};
    if(!body.player||!body.odds){return;}
    await api("/api/manual-odds/"+STATE.date,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    renderValue();

  document.querySelectorAll("button[data-del]").forEach(b=>b.onclick=async()=>{
    await api("/api/manual-odds/"+STATE.date+"/"+b.dataset.del,{method:"DELETE"}); renderValue();});
  // Refresh API Odds — the ONLY path that calls the paid provider (explicit click)
  const ab=$("#btnApiOdds");
  if(ab) ab.onclick=async()=>{
    const st=$("#oddsApiStatus"); st.textContent="pulling live odds…"; ab.disabled=true;
    try{
      const r=await api("/api/odds-refresh/"+STATE.date,{method:"POST",
        headers:{"Content-Type":"application/json"},body:JSON.stringify({})});

          quota_exhausted:"API quota exhausted"}[r.error]||r.error||"failed";
        st.textContent="❌ "+msg;
      }else if(r.records_saved===0){
        // 0 records with a valid key is NOT an error — props post near first pitch
        st.innerHTML=`<span style="color:#e3b341">API connected, but player props are not available yet. `+
          `Try closer to first pitch or enter odds manually.</span> `+
          `<span class="sp">(key ${r.active_key_name} · quota ${r.quota_remaining??"?"})</span>`;
      }else{
        st.innerHTML=`✅ key <b>${r.active_key_name}</b> · ${r.records_saved} records · `+
          `books ${(r.books||[]).join(", ")||"—"} · quota ${r.quota_remaining??"?"}`+
          ((r.errors&&r.errors.length)?` · <span style="color:#f0a064">errors: ${r.errors.join(",")}</span>`:"");
        renderValue();
      }
    }catch(e){ st.textContent="❌ request failed"; }
    finally{ ab.disabled=false; }
  };
}

// --- glossary + tooltips (Phase 16) ---
let GLOSSARY={groups:[]}, GBYABBR={};
const ALIAS={"B% VS PM":"B%PM","VS HAND":"B%H","SP△":"SPΔ","SPOT":"SPOT","PLT":"PLT",
  "ENV":"ENV","HR%":"HR%","TB%":"TB%","VAL":"VAL","TAGS":"TAGS","B%PM":"B%PM","B%H":"B%H"};
async function loadGlossary(){
  try{ GLOSSARY=await api("/api/glossary"); }catch(e){ return; }
  (GLOSSARY.groups||[]).forEach(g=>g.terms.forEach(t=>{GBYABBR[t.abbr.toUpperCase()]=t;}));
}
function tipHtml(t){
  return `<div class="tt">${t.abbr} — ${t.name}</div><div class="tw">${t.meaning}</div>`
    +(t.why?`<div class="tw" style="margin-top:4px">${t.why}</div>`:"")
    +(t.good?`<div class="tg">✓ good: ${t.good}</div>`:"")
    +(t.bad?`<div class="tb">✗ bad: ${t.bad}</div>`:"");
}
function initTips(){
  const tip=$("#tip");
  document.addEventListener("mouseover",e=>{
    const el=e.target.closest("[data-tip]"); if(!el)return;
    tip.innerHTML=el.getAttribute("data-tip"); tip.style.display="block";
  });
  document.addEventListener("mousemove",e=>{
    if(tip.style.display!=="block")return;
    let x=e.clientX+14,y=e.clientY+14;
    if(x+310>innerWidth)x=e.clientX-314; if(y+120>innerHeight)y=e.clientY-120;
    tip.style.left=x+"px"; tip.style.top=y+"px";
  });
  document.addEventListener("mouseout",e=>{ if(e.target.closest("[data-tip]")) tip.style.display="none"; });
}
function attachHeaderTips(){
  document.querySelectorAll("#view th").forEach(th=>{
    const raw=th.textContent.replace(/[▼▲]/g,"").trim().toUpperCase();
    const abbr=ALIAS[raw]||raw;
    const t=GBYABBR[abbr]; if(t){ th.setAttribute("data-tip",tipHtml(t)); }
  });
}
function freshnessHtml(meta){
  if(!meta||!meta.sections)return "";
  const order=["schedule","lineups","weather","pitchers","statcast","odds"];
  const labels={schedule:"Schedule",lineups:"Lineups",weather:"Weather",
    pitchers:"Pitchers",statcast:"Statcast",odds:"Odds"};
  const age=meta.built_at?Math.round((Date.now()-new Date(meta.built_at))/60000):null;
  const stale=meta.stale_minutes||{};
  const chips=order.map(k=>{
    const s=meta.sections[k]; if(!s)return "";
    let color=s.state||"gray";
    // escalate to red if older than stale threshold
    if(age!=null && stale[k]!=null && age>stale[k] && color==="green") color="yellow";
    let val="";
    if(k==="lineups")val=`${s.confirmed||0}c/${s.projected||0}p`;
    else if(k==="weather")val=`${s.have_temp||0} games`;
    else if(k==="pitchers")val=`${s.found||0} set`;
    else if(k==="statcast")val=`${s.pulled||0} pulled`;
    else if(k==="odds")val=s.present?"present":"none";
    else if(k==="schedule")val=`${s.count||0} games`;
    return `<div class="fchip"><span class="fdot ${color}"></span><span class="fl">${labels[k]}</span> <span class="fv">${val}</span></div>`;
  }).join("");
  const ageChip=`<div class="fchip"><span class="fl">updated</span> <span class="fv">${age==null?"—":age+"m ago"}</span></div>`;
  return `<div class="fresh">${chips}${ageChip}</div>`;
}
function renderGlossary(){
  const g=GLOSSARY.groups||[];
  let html=`<div class="gloss"><div class="sp" style="color:var(--muted);margin-bottom:6px">Hover any column header on the other tabs for a quick definition.</div>`;
  for(const grp of g){
    html+=`<h3>${grp.title}</h3><div class="panel"><table><thead><tr>
      <th>Term</th><th>Means</th><th>Why it matters</th><th>Good</th><th>Bad</th></tr></thead><tbody>`;
    html+=grp.terms.map(t=>`<tr>
      <td class="ab">${t.abbr}<div class="sp" style="color:var(--muted);font-weight:400">${t.name}</div></td>
      <td>${t.meaning}</td><td style="color:#adbac7">${t.why||""}</td>
      <td class="gd">${t.good||""}</td><td class="bd">${t.bad||""}</td></tr>`).join("");
    html+=`</tbody></table></div>`;
  }
  $("#view").innerHTML=html+`</div>`;
}
async function validate(){
  setStatus("run","validating…");
  let r; try{ r=await api("/api/validate/"+STATE.date); }catch(e){ setStatus("err","validate failed"); return; }
  const rows=r.checks.map(c=>`<div class="vrow">

// --- jobs ---
let POLL=null;
function setStatus(cls,txt){ $("#status").innerHTML=`<span class="dot ${cls}"></span>${txt}`; }
function busy(b){ ["btnRun","btnRefresh","btnGrade"].forEach(id=>$("#"+id).disabled=b); }
async function trigger(kind){
  const date = STATE.date;          // single source of truth for every action
  busy(true); setStatus("run", kind+" "+date+" …");
  let job;
  try{ job = await api("/api/"+kind,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({date, no_statcast:$("#noStat").checked})}); }
  catch(e){ busy(false); setStatus("err","failed to start"); return; }
  clearInterval(POLL);
  POLL=setInterval(async()=>{
    let j; try{ j=await api("/api/job/"+job.job_id);}catch(e){return;}
    if(j.state==="running"||j.state==="queued"){ setStatus("run", kind+" running…"); return; }
    clearInterval(POLL); busy(false);
    if(j.state==="error"){ setStatus("err", (j.error||"error").slice(0,60)); return; }
    const r=j.result||{};
    if(kind==="grade"){ STATE.lastGraded=j.date; setStatus("ok","Last graded: "+j.date); }
    else setStatus("ok", `done · ${r.games||0}g ${r.tier1||0} T1`);
    STATE.date=j.date; await loadDates();
    if(kind==="grade"){ STATE.tab="ledger"; setTab(); updateSlateBar(); } else { await loadSlate(); }
  }, 1500);
}

  document.querySelectorAll("#tabs button").forEach(b=>b.classList.toggle("active",b.dataset.tab===STATE.tab));

document.querySelectorAll("#tabs button").forEach(b=>b.onclick=()=>{STATE.tab=b.dataset.tab; setTab();});
